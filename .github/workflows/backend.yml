name: Backend CI

on:
  pull_request:
    branches: [main]
    paths: ['backend/**']
  push:
    branches: [main]
    paths: ['backend/**']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      # SCAFFOLD GUARD — remove once backend/ has real Python tooling.
      # Until pyproject.toml or requirements.txt exists, this job skips its real
      # steps and stays green. Owner (Bella): add your project config + tests,
      # then delete this guard block and the `if:` conditions below.
      - name: Check for Python project
        id: check
        run: |
          if [ -f pyproject.toml ] || [ -f requirements.txt ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Python project config yet — skipping backend CI. Add pyproject.toml or requirements.txt + tests to enable lint/test."
          fi

      - name: Set up Python
        if: steps.check.outputs.ready == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.check.outputs.ready == 'true'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi
          pip install ruff pytest

      - name: Lint (ruff)
        if: steps.check.outputs.ready == 'true'
        run: ruff check .

      - name: Test (pytest)
        if: steps.check.outputs.ready == 'true'
        run: pytest
